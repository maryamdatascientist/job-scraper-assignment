<!DOCTYPE html>
<html>

<head>
    <title>Job Listings</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #333;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }
    </style>
</head>

<body>

    <h1>Job Listings</h1>

    <input type="text" id="search" placeholder="Search jobs...">

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Company</th>
                <th>Location</th>
                <th>Date</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        async function loadData() {
            const res = await fetch("/data/processed/jobs_scrapy.csv");
            const text = await res.text();

            const rows = text.trim().split("\n").slice(1);
            const table = document.getElementById("tableBody");

            table.innerHTML = "";

            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

                if (!cols || cols.length < 5) return;

                const title = cols[0].replace(/"/g, "").trim();
                const company = cols[1].replace(/"/g, "").trim();
                const location = cols[2].replace(/"/g, "").trim();
                const date = cols[3].replace(/"/g, "").trim();
                const url = cols[4].replace(/"/g, "").trim();

                const tr = document.createElement("tr");

                tr.innerHTML = `
            <td>${title}</td>
            <td>${company}</td>
            <td>${location}</td>
            <td>${date}</td>
            <td><a href="${url}" target="_blank">View</a></td>
        `;

                table.appendChild(tr);
            });
        }

        // SEARCH
        document.getElementById("search").addEventListener("keyup", function () {
            const value = this.value.toLowerCase();
            const rows = document.querySelectorAll("#tableBody tr");

            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(value)
                    ? ""
                    : "none";
            });
        });

        loadData();
    </script>

</body>

</html>
